AWSTemplateFormatVersion: "2010-09-09"
Description: >
  One-time bootstrap: GitHub OIDC provider + minimal deploy role.
  Deploy this from your Organization (StackSet or assume-role into 884058771712).
  After this, CI/CD self-manages everything else.

Parameters:
  GitHubOrg:
    Type: String
    Default: barkingiguana
  GitHubRepo:
    Type: String
    Default: thea-recorder

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 7560d6f40fa55195f740ee2b1b7c0b4836cbe103

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${GitHubRepo}-deploy"
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: InfraDeployment
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudFormation — scoped to stacks prefixed with the repo name
              - Sid: CloudFormation
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                  - cloudformation:ValidateTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:ListChangeSets
                Resource:
                  - !Sub "arn:aws:cloudformation:us-east-1:${AWS::AccountId}:stack/${GitHubRepo}-*"

              # S3 — create/manage the site bucket only
              - Sid: S3Manage
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:GetBucketPolicy
                  - s3:PutEncryptionConfiguration
                  - s3:GetEncryptionConfiguration
                  - s3:PutBucketPublicAccessBlock
                  - s3:GetBucketPublicAccessBlock
                Resource:
                  - !Sub "arn:aws:s3:::${GitHubRepo}-site"
              - Sid: S3Content
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::${GitHubRepo}-site"
                  - !Sub "arn:aws:s3:::${GitHubRepo}-site/*"

              # Route 53 — hosted zone management
              # Cannot scope to specific zone ARN at creation time
              - Sid: Route53
                Effect: Allow
                Action:
                  - route53:CreateHostedZone
                  - route53:DeleteHostedZone
                  - route53:GetHostedZone
                  - route53:ListHostedZones
                  - route53:ChangeResourceRecordSets
                  - route53:ListResourceRecordSets
                  - route53:GetChange
                  - route53:ChangeTagsForResource
                Resource: "*"

              # ACM — certificates in us-east-1 (required for CloudFront)
              - Sid: ACM
                Effect: Allow
                Action:
                  - acm:RequestCertificate
                  - acm:DescribeCertificate
                  - acm:DeleteCertificate
                  - acm:AddTagsToCertificate
                  - acm:ListCertificates
                  - acm:ListTagsForCertificate
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:RequestedRegion: us-east-1

              # CloudFront — distribution + OAC management
              - Sid: CloudFront
                Effect: Allow
                Action:
                  - cloudfront:CreateDistribution
                  - cloudfront:UpdateDistribution
                  - cloudfront:DeleteDistribution
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:TagResource
                  - cloudfront:UntagResource
                  - cloudfront:ListTagsForResource
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetInvalidation
                  - cloudfront:CreateOriginAccessControl
                  - cloudfront:UpdateOriginAccessControl
                  - cloudfront:DeleteOriginAccessControl
                  - cloudfront:GetOriginAccessControl
                  - cloudfront:GetOriginAccessControlConfig
                Resource: "*"

Outputs:
  RoleArn:
    Value: !GetAtt DeployRole.Arn
    Description: Add this as AWS_ROLE_ARN secret in GitHub repo settings
  OIDCProviderArn:
    Value: !Ref GitHubOIDCProvider
