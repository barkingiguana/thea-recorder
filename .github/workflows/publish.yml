name: Publish

on:
  release:
    types: [published]

jobs:
  python:
    name: Publish Python to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: astral-sh/setup-uv@v4
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1

  go:
    name: Publish Go SDK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: sdks/go/go.mod
      - run: cd sdks/go && go test ./thea/ -v
      - run: cd sdks/go && go vet ./thea/
      - name: Tag Go module
        run: |
          VER="${{ github.event.release.tag_name }}"
          VER="${VER#v}"
          TAG="sdks/go/v${VER}"
          git tag "$TAG"
          git push origin "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
