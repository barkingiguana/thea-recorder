name: Release

on:
  release:
    types: [published]

jobs:
  version-check:
    name: Verify version consistency
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
      - name: Check tag matches VERSION
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(cat VERSION | tr -d '[:space:]')"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Tag v$TAG does not match VERSION file ($VER)"
            exit 1
          fi
      - name: Check all package versions match
        run: |
          VER="$(cat VERSION | tr -d '[:space:]')"
          FAIL=0
          check() { if [ "$2" != "$VER" ]; then echo "::error::$1 has version $2, expected $VER"; FAIL=1; fi; }
          check "pyproject.toml" "$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          check "src/thea/cli.py" "$(grep '"version":' src/thea/cli.py | sed 's/.*"\([0-9][^"]*\)".*/\1/')"
          check "sdks/python/pyproject.toml" "$(grep '^version' sdks/python/pyproject.toml | sed 's/.*"\(.*\)".*/\1/')"
          check "sdks/node/package.json" "$(node -p "require('./sdks/node/package.json').version")"
          check "sdks/ruby/lib/recorder.rb" "$(grep 'VERSION' sdks/ruby/lib/recorder.rb | sed 's/.*"\(.*\)".*/\1/')"
          check "sdks/java/pom.xml" "$(grep '<version>' sdks/java/pom.xml | head -1 | sed 's/.*<version>\(.*\)<\/version>.*/\1/')"
          exit $FAIL

  python:
    name: Publish Python to PyPI
    needs: version-check
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1

  go:
    name: Publish Go SDK
    needs: version-check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: sdks/go/go.mod
      - run: cd sdks/go && go test ./thea/ -v
      - run: cd sdks/go && go vet ./thea/
      - name: Tag Go module
        run: |
          VER="${{ needs.version-check.outputs.version }}"
          TAG="sdks/go/v${VER}"
          git tag "$TAG"
          git push origin "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
