name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  check:
    name: Determine next version
    # Skip version-bump commits pushed by this workflow
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.bump.outputs.should_release }}
      next_version: ${{ steps.bump.outputs.next_version }}
      bump_type: ${{ steps.bump.outputs.bump_type }}
      python_changed: ${{ steps.changes.outputs.python }}
      go_changed: ${{ steps.changes.outputs.go }}
      changelog: ${{ steps.changelog.outputs.text }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute semver bump from commits
        id: bump
        run: |
          # Find the latest semver tag
          LAST_TAG="$(git tag -l 'v[0-9]*' --sort=-v:refname | head -1)"

          if [ -z "$LAST_TAG" ]; then
            echo "No existing version tag found — skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT="${LAST_TAG#v}"
          RANGE="${LAST_TAG}..HEAD"
          COMMITS="$(git log "$RANGE" --pretty=format:"%s" 2>/dev/null || true)"

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LAST_TAG"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="none"

          # Check for breaking changes
          if echo "$COMMITS" | grep -qiE '^[a-z]+(\(.+\))?!:|BREAKING[ -]CHANGE'; then
            BUMP="major"
          # Check for features
          elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
            BUMP="minor"
          # Check for fixes
          elif echo "$COMMITS" | grep -qE '^fix(\(.+\))?:'; then
            BUMP="patch"
          fi

          if [ "$BUMP" = "none" ]; then
            echo "No releasable commits since $LAST_TAG"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) NEXT="$((MAJOR + 1)).0.0" ;;
            minor) NEXT="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "next_version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "bump_type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP ($CURRENT -> $NEXT)"

      - name: Detect changed packages
        id: changes
        if: steps.bump.outputs.should_release == 'true'
        run: |
          LAST_TAG="${{ steps.bump.outputs.last_tag }}"
          CHANGED="$(git diff --name-only "$LAST_TAG"..HEAD)"

          # Python: core package or SDK
          if echo "$CHANGED" | grep -qE '^(src/thea/|pyproject\.toml|sdks/python/)'; then
            echo "python=true" >> "$GITHUB_OUTPUT"
            echo "Python package changed"
          else
            echo "python=false" >> "$GITHUB_OUTPUT"
            echo "Python package unchanged — will skip publish"
          fi

          # Go SDK
          if echo "$CHANGED" | grep -qE '^sdks/go/'; then
            echo "go=true" >> "$GITHUB_OUTPUT"
            echo "Go SDK changed"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "Go SDK unchanged — will skip publish"
          fi

      - name: Generate changelog
        id: changelog
        if: steps.bump.outputs.should_release == 'true'
        run: |
          LAST_TAG="${{ steps.bump.outputs.last_tag }}"
          VER="${{ steps.bump.outputs.next_version }}"

          # Categorise commits
          BREAKING=""
          FEATURES=""
          FIXES=""
          OTHER=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            # Skip chore: bump commits
            echo "$line" | grep -q "^chore: bump" && continue

            if echo "$line" | grep -qiE '^[a-z]+(\(.+\))?!:|BREAKING[ -]CHANGE'; then
              BREAKING="${BREAKING}- ${line}\n"
            elif echo "$line" | grep -qE '^feat(\(.+\))?:'; then
              FEATURES="${FEATURES}- ${line}\n"
            elif echo "$line" | grep -qE '^fix(\(.+\))?:'; then
              FIXES="${FIXES}- ${line}\n"
            else
              OTHER="${OTHER}- ${line}\n"
            fi
          done <<< "$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")"

          NOTES=""
          [ -n "$BREAKING" ] && NOTES="${NOTES}### Breaking Changes\n${BREAKING}\n"
          [ -n "$FEATURES" ] && NOTES="${NOTES}### Features\n${FEATURES}\n"
          [ -n "$FIXES" ] && NOTES="${NOTES}### Fixes\n${FIXES}\n"
          [ -n "$OTHER" ] && NOTES="${NOTES}### Other\n${OTHER}\n"

          # Output for GitHub release and CHANGELOG.md
          echo "text<<EOFCHANGELOG" >> "$GITHUB_OUTPUT"
          printf "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOFCHANGELOG" >> "$GITHUB_OUTPUT"

  release:
    name: Bump, tag, and release
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.check.outputs.next_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump all versions
        run: |
          VER="${{ needs.check.outputs.next_version }}"
          bash scripts/bump-version.sh "$VER"

      - name: Update CHANGELOG.md
        run: |
          VER="${{ needs.check.outputs.next_version }}"
          DATE="$(date -u +%Y-%m-%d)"
          ENTRY="## [${VER}] — ${DATE}

          ${{ needs.check.outputs.changelog }}"

          if [ -f CHANGELOG.md ]; then
            # Insert after the title line
            EXISTING="$(cat CHANGELOG.md)"
            HEADER="$(head -1 CHANGELOG.md)"
            REST="$(tail -n +2 CHANGELOG.md)"
            printf '%s\n\n%s\n%s\n' "$HEADER" "$ENTRY" "$REST" > CHANGELOG.md
          else
            printf '# Changelog\n\n%s\n' "$ENTRY" > CHANGELOG.md
          fi

      - name: Commit and tag
        run: |
          VER="${{ needs.check.outputs.next_version }}"
          git add -A
          git commit -m "chore: bump version to ${VER}" || true
          git tag "v${VER}"
          git push origin main --tags

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ needs.check.outputs.next_version }}"
          NOTES="${{ needs.check.outputs.changelog }}"
          gh release create "v${VER}" \
            --title "v${VER}" \
            --notes "$NOTES"

  python:
    name: Publish Python to PyPI
    needs: [check, release]
    if: needs.check.outputs.python_changed == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}
      - uses: astral-sh/setup-uv@v4
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1

  go:
    name: Publish Go SDK
    needs: [check, release]
    if: needs.check.outputs.go_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: sdks/go/go.mod
      - run: cd sdks/go && go test ./thea/ -v
      - run: cd sdks/go && go vet ./thea/
      - name: Tag Go module
        run: |
          VER="${{ needs.release.outputs.version }}"
          TAG="sdks/go/v${VER}"
          git tag "$TAG"
          git push origin "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
