name: Publish Go SDK

on:
  push:
    tags: ["sdks/go/v*"]

jobs:
  test:
    name: Validate Go SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: sdks/go/go.mod
      - run: cd sdks/go && go test ./recorder/ -v
      - run: cd sdks/go && go vet ./recorder/
