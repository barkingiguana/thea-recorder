<!DOCTYPE html>
<html>
<head>
    <title>Thea E2E Test Page</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            color: #e0e0e0;
        }
        h1 { color: #58a6ff; margin-bottom: 2rem; }
        #counter { font-size: 4rem; margin: 1rem 0; }
        button {
            padding: 1rem 2rem;
            font-size: 1.5rem;
            background: #58a6ff;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background: #79b8ff; }
        #result {
            margin-top: 2rem;
            font-size: 1.5rem;
            color: #7ee787;
            min-height: 2rem;
        }
    </style>
</head>
<body>
    <h1>Thea Recording Test</h1>
    <div id="counter">0</div>
    <button id="increment" onclick="increment()">Click Me</button>
    <div id="result"></div>

    <script>
        let count = 0;
        function increment() {
            count++;
            document.getElementById('counter').textContent = count;
            if (count >= 3) {
                document.getElementById('result').textContent = 'Test complete!';
            }
        }
    </script>
</body>
</html>
